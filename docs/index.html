<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Portfolio</title>
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/SleepyNqx/subtrahi3rtes/refs/heads/main/Titelloses%20419_20260520220743.PNG">
</head>
<style>
  @font-face {
    font-family: sfProRegular;
    src: url("./SFPRODISPLAYREGULAR.OTF");
  }

  * {
    box-sizing: border-box;
  }

body {
    cursor: none;
    font-family: sfProRegular, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
    color: white;
    overflow-x: hidden;
    width: 100%;
    min-height: 100vh;

    background-color: #0e0e0e;
    background-image: radial-gradient(circle, #ffffff34 1px, transparent 1px);  
    background-size: 28px 28px;

    animation: moveBackground 20s linear infinite;
}

@keyframes moveBackground {
    from {
        background-position: -280px -280px;
    }
    to {
        background-position: 28px 28px;
    }
}
  .borderSubtle {

    border: 1px solid #50505050;

  }

  .glowHover:hover {

    box-shadow: #ffffff49 0px 0px 50px;
    transition: 0.3s ease;

  }
  .glowHover {

    box-shadow: transparent 0px 0px 0px;
    transition: 0.3s ease;
  }

  .glowHoverText:hover {

    filter: drop-shadow(0px 0px 10px white);
    transition: 0.3s ease;

  }
  .glowHoverText {

    filter: drop-shadow(0px 0px 0px transparent);
    transition: 0.3s ease;
  }

  .pfpImage {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background-image: url("https://raw.githubusercontent.com/SleepyNqx/subtrahi3rtes/refs/heads/main/Titelloses%20419_20260520220743.PNG");
    background-size: cover;
    background-position: center;
    top: 0px;
    animation: bounce 3s infinite ease-in-out;
}

@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }

    25% {
        transform: translateY(-15px);
    }

    50% {
        transform: translateY(0);
    }

    75% {
        transform: translateY(-8px);
    }
}

.center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    place-items: center;
    text-align: center;

  }
  .gap {

    padding-top: 50px;

  }
  .fontGradient {

    background: linear-gradient(0deg, #575757,white);
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    font-size: 40px;

  }

  .paragraphfix {

    display: block;
    margin-block-start: 0px;
    margin-block-end: 0;
    margin-inline-start: 0px;
    margin-inline-end: 0px;
    unicode-bidi: isolate;

  }

.usernameContainer {
    padding: 5px;
    backdrop-filter: blur(5px);
    background: #57575767;

    display: inline-flex;
    align-items: center;
    justify-content: center;
    place-items: center;
    border-radius: 999px;
}

.username {

    background: linear-gradient(0deg, #002658,#6eb9ff);
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    text-decoration: none;

}

.username:hover {
    filter: drop-shadow(0px 0px 5px #6eb9ff);
    background: linear-gradient(0deg, #002658,#6eb9ff);
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
    text-decoration: none;

}

.row {

  flex-direction: row;

}

.dot {

  padding-right: 5px;
  padding-left: 5px;
  color: #00ff00;
  filter: drop-shadow(#00ff00 0px 0px 5px);

}

.biography {

  background: #57575717;
  backdrop-filter: blur(5px);

}

.padding {

  padding: 7px;

}

.subtrahi3rtes {
    background: linear-gradient(0deg, #575757,white);
    -webkit-text-fill-color: transparent;
    background-clip: text;
    -webkit-background-clip: text;
}

    /* Joystick base */
    .cursor-base {
        position: fixed;
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(2px);
        z-index: 9999;
    }

    /* Joystick stick */
    .cursor-stick {
        position: fixed;
        width: 16px;
        height: 16px;
        background: rgba(255, 255, 255, 0.425);
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(2px);
        z-index: 10000;
        box-shadow: 0 0 20px rgba(255,255,255,.4);
    }


</style>

<body>
<div class="cursor-base"></div>
<div class="cursor-stick"></div>
<div class="gap">
  <div class="center">
    <div class="pfpImage glowHover borderSubtle"></div>
    <div>
      <p class="fontGradient glowHoverText paragraphfix">subtrahi3rtes</p>
      <div class="usernameContainer center borderSubtle glowHover row">
        <p class="paragraphfix dot">•</p><p class="paragraphfix username center">@w.sub</p>
      </div>
    </div>
    <div class="gap paragraphfix">
      <div class="borderSubtle">
        <div class="paragraphfix biography padding">
          <span class="subtrahi3rtes">hello! im and im a minecraft pvper and "pack creator".<br>I make (most) of my texture packs i use myself. If you want to use<br>these packs check out my pack page<br>on <a href="discord.subtrahi3rtes.xyz" class="username">packs.subtrahi3rtes.xyz</a></span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
<script>
const base = document.querySelector(".cursor-base");
const stick = document.querySelector(".cursor-stick");

let mouseX = innerWidth / 2;
let mouseY = innerHeight / 2;

let baseX = mouseX;
let baseY = mouseY;

window.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {
    // smooth base follow
    baseX += (mouseX - baseX) * 0.05;
    baseY += (mouseY - baseY) * 0.05;

    const dx = mouseX - baseX;
    const dy = mouseY - baseY;

    // 🔥 NO clamp — allow full range + slight exaggeration
    const stretchFactor = 1.3;

    const offsetX = dx * stretchFactor;
    const offsetY = dy * stretchFactor;

    base.style.left = baseX + "px";
    base.style.top = baseY + "px";

    stick.style.left = (baseX + offsetX) + "px";
    stick.style.top = (baseY + offsetY) + "px";

    requestAnimationFrame(animate);
}

animate();
</script>

</html>
