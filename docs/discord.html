<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>sub's hub</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --border-subtle: #97979F1F;
            --bgColor-title: #23272a;
            --bgColor-title-darker: #1a1d20;
            --bgColor-title-alt: #121214;
            --bg-main: #2c2f33;
        }

        * {
            box-sizing: border-box;
        }

        @keyframes rainbowAnimation {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 400% 50%;
            }
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .contentMain {
            background: transparent;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .titleBar {
            background-color: var(--bgColor-title);
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 34px;
            border-bottom: var(--border-subtle) 1px solid;
            flex-shrink: 0;
        }

        .socialsButton {
            background-color: var(--bgColor-title-darker);
            color: #ffffff;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            display: flex;
            justify-content: start;
            align-items: start;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 3px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .socialsButton:hover {
            background-color: var(--bgColor-title-alt);
        }

        .seperatorOne {
            width: 1px;
            height: 20px;
            background-color: var(--border-subtle);
            margin: 0 10px;
        }

        .seperatorTwo {
            width: 50px;
            height: 1px;
            background-color: var(--border-subtle);
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rainbowGradient {
            font-weight: bold;
            background: linear-gradient(90deg,
                    #ff0000,
                    #ff7f00,
                    #ffff00,
                    #00ff00,
                    #0000ff,
                    #4b0082,
                    #8b00ff,
                    #ff0000);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: saturate(0) brightness(14);
            transition: filter 0.4s ease;
            animation: rainbowAnimation 10s linear infinite;
        }

        .rainbowGradient:hover {
            filter: saturate(1) brightness(1);
        }

        .starter {
            display: flex;
            justify-content: start;
            align-items: center;
            padding: 2px 5px;
        }

        .MiddleText {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .textDefault {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
        }

        .iconMain {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .windowsButtons {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .windowButtonMinimize,
        .windowButtonMaximize,
        .windowButtonClose {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 34px;
            height: 34px;
            cursor: pointer;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SCROLLABLE SERVER LIST */
        .serverList {
            width: 72px;
            background: var(--bg-main);
            overflow-y: auto;
            overflow-x: hidden;
            height: 100%;
            padding-bottom: 10px;
        }

        .serverList::-webkit-scrollbar {
            width: 6px;
        }

        .serverList::-webkit-scrollbar-thumb {
            background: #1f2225;
            border-radius: 10px;
        }

        .serverList::-webkit-scrollbar-track {
            background: transparent;
        }

        .serverListImage {
            width: 50px;
            height: 50px;
            border-radius: 25%;
            object-fit: cover;
            transition: transform 0.2s ease, border-radius 0.2s ease;
        }

        .serverListImagePadding {
            padding: 10px;
            list-style: none;
        }

        ::marker {
            color: transparent;
        }

        .centerContent {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 4px 0;
        }
        .windowButtonClose {
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .windowButtonMaximize {
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .windowButtonMinimize {
            background-color: transparent;
            transition: all 0.3s ease;
        }
        .windowButtonClose:hover {
            background: linear-gradient(45deg, #ff4d4d, #ff0000);
            transition: all 0.3s ease;
        }
        .windowButtonMaximize:hover {
            background: linear-gradient(45deg, #4d79ff, #0040ff);
            transition: all 0.3s ease;
        }
        .windowButtonMinimize:hover {
            background: linear-gradient(45deg, #4dff4d, #00ff00);
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>

                <div class="windowButtonClose">

        <div class="main-wrapper">

                <li class="serverListImagePadding">

                <li class="serverListImagePadding">
                    <img src="./serverList.jpg" alt="Server List"

                </li>

                    <img src="./serverList.jpg" alt="Server List"

            </div>
        </div>
    </div>
</body>
